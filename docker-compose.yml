services:
  horae:
    build: .
    container_name: horae
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      radicale:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  radicale:
    image: tomsquest/docker-radicale:latest
    container_name: radicale
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    read_only: true
    volumes:
      - radicale_data:/data
      - ./radicale:/config:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - KILL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5232/.web/", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  radicale_data:
